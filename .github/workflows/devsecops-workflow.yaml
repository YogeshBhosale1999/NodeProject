name: Build code, run unit test, run SAST, SCA, DAST security scans for NodeJs App

on: push

permissions:
  issues: write   # allow ZAP to create issues

jobs:
  build:
    runs-on: ubuntu-latest
    name: Run unit tests and SAST scan on the source code 
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 21
          cache: npm

      - run: npm install
      - run: npm test   # will work if mocha-sonarqube-reporter is installed, or just use default mocha

      - name: SonarCloud Scan
        uses: sonarsource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=yogeshbhosale1999
            -Dsonar.projectKey=YogeshBhosale1999_NodeProject

  security:
    runs-on: ubuntu-latest
    needs: build
    name: Run the SCA scan on the source code
    steps:
      - uses: actions/checkout@v4
      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  zap_scan:
    runs-on: ubuntu-latest
    needs: security
    name: Run DAST scan on the web application
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: ZAP Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'http://demo.testfire.net'   # demo vulnerable app
          cmd_options: '-a'
          issue_title: 'ZAP Security Scan Findings'
          allow_issue_writing: true
          artifact_name: zap-reports   # ensures artifact name is unique and avoids conflicts
      - name: Upload ZAP Reports
        uses: actions/upload-artifact@v4
        with:
          name: zap-reports-${{ github.run_id }}   # unique artifact name per run
          path: |
            report_html.html
            report_md.md
            report_json.json
